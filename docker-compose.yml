# Order Manager — full stack: Postgres + backend (Express/Prisma) + frontend (nginx).
#
# Local:   cp .env.docker.example .env.docker  (điền secrets)
#          docker compose up -d --build
#          → app tại http://localhost:${FRONTEND_PORT:-8080}
# Server:  copy repo + .env.docker lên server, sửa FRONTEND_URL/SHOPIFY_APP_URL
#          thành domain public, đặt TLS reverse proxy (caddy/nginx) trước cổng
#          frontend. DB nằm trong volume `pgdata` — backup volume này.
#
# (File cũ chỉ có postgres+redis cho hạ tầng dev — redis không được code dùng,
#  DB dev thật chạy native ngoài Docker — nên đã thay bằng stack đầy đủ.)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tab_order_fetcher}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Chỉ để tiện psql từ host; 55432 tránh đụng Postgres native 5432.
      - "${DB_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tab_order_fetcher}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      # DNS nội bộ `db` — đè lên DATABASE_URL trong .env.docker (nếu có).
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-tab_order_fetcher}
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/api/test"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  frontend:
    build:
      context: .
      args:
        VITE_FACEBOOK_APP_ID: ${VITE_FACEBOOK_APP_ID:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  pgdata:
