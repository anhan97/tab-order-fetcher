# Frontend nginx: SPA + API reverse-proxy.
# Everything under /api goes to the backend container, so the browser only
# ever talks to ONE origin — same shape as the Vite dev proxy.
server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # API → backend service (docker-compose network name)
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Static SPA with client-side routing fallback
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets
    location /assets/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
